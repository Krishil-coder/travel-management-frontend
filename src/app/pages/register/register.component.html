<section class="auth-page">
  <div class="auth-intro">
    <span>Employee setup</span>
    <strong>Add people fast.</strong>
    <p>Create employee profiles so travel requests, approvals, and reimbursements can move through the right teams.</p>
  </div>

  <div class="auth-card card">
    <h1>Register employee</h1>
    <p class="muted">Enter the basic employee details.</p>

    <form #registerForm="ngForm" (ngSubmit)="register()" class="form-stack">
      <div class="form-field">
        <label for="name">Full Name</label>
        <input id="name" name="name" required [(ngModel)]="name" />
      </div>

      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required [(ngModel)]="email" />
      </div>

      <div class="form-field">
        <label for="department">Department</label>
        <input id="department" name="department" required [(ngModel)]="department" />
      </div>

      <p *ngIf="message" class="error">{{ message }}</p>
      <button class="btn btn-primary full-button" type="submit">Register</button>
      <a routerLink="/dashboard" class="auth-link">Back to dashboard</a>
    </form>
  </div>
</section>
